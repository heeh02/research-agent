research_question: "What are the comprehensive technical specifications, computational requirements, and performance characteristics of OpenVLA (Open Vision-Language-Action model), including parameter count, architecture details, memory requirements, inference speed, and comparison with RT-2?"

search_scope: "Vision-Language-Action models, robotics transformers, OpenVLA technical specifications, RT-2 computational analysis, VLA efficiency benchmarks, robotics foundation models (2022-2025)"

papers:
  - title: "OpenVLA: An Open-Source Vision-Language-Action Model"
    authors: "Moo Jin Kim, Karl Pertsch, Siddharth Karamcheti, et al."
    year: 2024
    venue: "arXiv:2406.09246"
    method: "Fused DINOv2+SigLIP visual encoder with Llama-2 7B language model for action prediction"
    key_results: "7B parameters, 16.5% higher success rate than RT-2-X (55B), 6 Hz inference on RTX 4090, 15.9GB memory usage"
    limitations: "Lower inference frequency compared to smaller models, requires 15GB+ GPU memory for deployment"
    relevance_score: 10

