# Schema for hypothesis_card artifact
required_fields:
  - claim
  - motivation
  - why_now
  - novelty_argument
  - key_assumptions
  - testable_predictions
  - baseline_comparison
  - expected_improvement
  - key_risks
  - kill_criteria
  - minimum_viable_experiment

field_types:
  claim: string
  motivation: string
  why_now: string
  novelty_argument: string
  key_assumptions: list
  testable_predictions: list
  baseline_comparison: string
  expected_improvement: string
  key_risks: list
  kill_criteria: list
  minimum_viable_experiment: string
  estimated_compute_budget: string

min_lengths:
  key_assumptions: 2
  testable_predictions: 2
  key_risks: 2
  kill_criteria: 2

min_string_lengths:
  claim: 30
  motivation: 30
  minimum_viable_experiment: 20

# Each risk must have a description and mitigation
list_item_fields:
  key_risks:
    - risk
    - mitigation
  testable_predictions:
    - prediction

cross_field_checks:
  # kill_criteria should have at least as many items as testable_predictions
  - rule: list_length_gte
    field_a: kill_criteria
    field_b: testable_predictions
