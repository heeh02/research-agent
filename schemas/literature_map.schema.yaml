# Schema for literature_map artifact
required_fields:
  - research_question
  - search_scope
  - papers
  - method_taxonomy
  - identified_gaps
  - recommended_baselines

field_types:
  research_question: string
  search_scope: string
  papers: list
  method_taxonomy: mapping
  identified_gaps: list
  conflicting_findings: list
  trend_analysis: string
  recommended_baselines: list

min_lengths:
  papers: 5
  identified_gaps: 2
  recommended_baselines: 2

min_string_lengths:
  research_question: 20
  search_scope: 10

# Every paper must have title and url (papers without URLs are rejected)
list_item_fields:
  papers:
    - title
    - url
  identified_gaps:
    - description
