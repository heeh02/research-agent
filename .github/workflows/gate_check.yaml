# Gate Check CI Pipeline
# Runs automated checks when a PR is opened for experiment code
#
# This replaces manual "GPT reviews, Claude fixes" with automated CI:
# 1. Schema validation for all artifacts
# 2. Code quality checks (lint, type check)
# 3. Unit tests
# 4. Smoke test (minimal experiment run)
# 5. Artifact structure validation

name: Gate Check

on:
  pull_request:
    branches: [main, staging-experiment]
    paths:
      - 'projects/**/artifacts/**'
      - 'projects/**/experiments/**'
      - '**.py'

permissions:
  contents: read
  pull-requests: write

jobs:
  schema-validation:
    name: Validate Artifact Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate artifacts
        run: |
          python -c "
          import yaml, sys, glob
          from pathlib import Path

          errors = []
          for schema_file in glob.glob('schemas/*.schema.yaml'):
              schema = yaml.safe_load(Path(schema_file).read_text())
              artifact_type = Path(schema_file).stem.replace('.schema', '')

              # Find all artifacts of this type
              for artifact_file in glob.glob(f'projects/**/artifacts/**/{artifact_type}_*.yaml', recursive=True):
                  data = yaml.safe_load(Path(artifact_file).read_text())
                  if data is None:
                      errors.append(f'{artifact_file}: empty file')
                      continue
                  for field in schema.get('required_fields', []):
                      if field not in data or data[field] is None or data[field] == '':
                          errors.append(f'{artifact_file}: missing required field: {field}')

          if errors:
              print('Schema validation FAILED:')
              for e in errors:
                  print(f'  ✗ {e}')
              sys.exit(1)
          else:
              print('✓ All artifacts pass schema validation')
          "

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

  codex-review:
    name: Codex Independent Review
    runs-on: ubuntu-latest
    needs: [schema-validation, code-quality, tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Run Codex review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Use codex exec for non-interactive CI review
          codex exec \
            --model gpt-5.4 \
            --sandbox workspace-write \
            --ask-for-approval never \
            "Review the research artifacts in this project for scientific rigor. \
            Check schemas/ for expected formats. Check projects/ for artifacts. \
            Score each criterion 0-1. Output a YAML verdict: PASS, FAIL, or REVISE \
            with blocking_issues, suggestions, and what_would_make_it_pass." \
            > codex_review_output.txt 2>&1 || true
          cat codex_review_output.txt

      - name: Upload review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-review
          path: codex_review_output.txt
          retention-days: 30

  smoke-test:
    name: Experiment Smoke Test
    runs-on: ubuntu-latest
    needs: [schema-validation, code-quality, tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install experiment dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Find and run smoke tests
        run: |
          # Look for run_manifest.yaml files and execute smoke test commands
          for manifest in $(find projects -name "run_manifest*.yaml" 2>/dev/null); do
            echo "Found manifest: $manifest"
            smoke_cmd=$(python -c "
            import yaml
            m = yaml.safe_load(open('$manifest'))
            print(m.get('smoke_test_command', ''))
            ")
            if [ -n "$smoke_cmd" ]; then
              echo "Running smoke test: $smoke_cmd"
              eval "$smoke_cmd"
            fi
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-artifacts
          path: |
            projects/**/results/
            projects/**/logs/
          retention-days: 30
