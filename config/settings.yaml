# Research Agent — Global Settings
# ================================

pipeline:
  automation_level: hybrid
  human_gates:
    - hypothesis_formation
    - experimentation
  max_iterations: 5
  confirm_before_advance: true

# Agent configurations
# backend: claude | codex | opencode
# For opencode models, use format: provider/model (e.g. volcengine-plan/doubao-seed-2.0-pro)
agents:
  researcher:
    backend: claude
    model: claude-sonnet-4-20250514
    effort: max
    max_turns: 30
    allowed_tools: "Read,Write,Glob,Grep,WebSearch,WebFetch,Agent"

  critic:
    backend: codex
    model: gpt-5.4
    effort: xhigh

  engineer:
    backend: claude
    model: claude-sonnet-4-20250514
    effort: high
    max_turns: 40
    allowed_tools: "Read,Write,Edit,Bash,Glob,Grep,WebSearch,WebFetch,Agent"

  orchestrator:
    backend: claude
    model: claude-sonnet-4-20250514
    effort: medium
    max_turns: 10
    allowed_tools: "Read,Write,Bash,Glob,Grep"

# OpenCode models reference (run: opencode models)
# volcengine-plan/doubao-seed-2.0-pro
# volcengine-plan/doubao-seed-2.0-lite
# volcengine-plan/doubao-seed-2.0-code
# volcengine-plan/deepseek-v3.2
# volcengine-plan/kimi-k2.5
# volcengine-plan/glm-4.7

# Cost management
cost:
  warning_threshold: 5.0
  hard_limit: 50.0
  codex_estimated_cost_per_review: 0.10

# Experiment tracking
tracking:
  enabled: false
  backend: mlflow

# GitHub integration
github:
  enabled: false

# Web GUI
gui:
  host: "127.0.0.1"
  port: 8080
